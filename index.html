<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#f8f7f4"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="DDW"/>
<title>DDW — Don't Die Wondering</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #f8f7f4;
  --white: #ffffff;
  --ink: #1a1a18;
  --ink2: #3a3a36;
  --dim: #8a8a82;
  --border: #e2e0da;
  --border2: #d0cec6;
  --accent: #1a1a18;
  --gold: #c9a84c;
  --sage: #6b7c5e;
  --red: #c44b3a;
  --card: #ffffff;
  --bg: #f8f7f4;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;overflow:hidden}
#app{height:100%;display:none;flex-direction:column}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* NAV */
#nav{flex-shrink:0;display:flex;background:var(--white);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nb{flex:1;border:none;background:transparent;color:var(--dim);padding:10px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;border-top:2px solid transparent;transition:all 0.2s;font-family:'DM Mono',monospace}
.nb.on{color:var(--ink);border-top-color:var(--ink)}
.nb .ni{font-size:16px}
.nb .nl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:inherit}

/* TYPOGRAPHY */
.serif{font-family:'Cormorant Garamond',serif}
.mono{font-family:'DM Mono',monospace}
.eyebrow{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);font-family:'DM Mono',monospace}
.display{font-family:'Cormorant Garamond',serif;font-weight:300;letter-spacing:-0.5px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:2px}
.card-soft{background:var(--white);border:1px solid var(--border2);border-radius:2px}

/* DIVIDER */
.rule{height:1px;background:var(--border);margin:0}

/* PILL */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border:1px solid var(--border2);border-radius:20px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.pill-dark{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.pill-gold{background:transparent;color:var(--gold);border-color:var(--gold)}
.pill-sage{background:transparent;color:var(--sage);border-color:var(--sage)}

/* MACRO BAR */
.macro-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.macro-fill{height:100%;border-radius:2px;transition:width 0.5s ease}

/* CHECKIN BUTTON */
.check-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:1px solid var(--border2);border-radius:2px;cursor:pointer;transition:all 0.2s;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--dim)}
.check-btn.done{background:var(--ink);color:var(--cream);border-color:var(--ink)}

/* PHOTO PLACEHOLDER */
.photo-box{background:var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:10px;letter-spacing:2px;text-transform:uppercase;font-family:'DM Mono',monospace}

/* TABS */
.tab-row{display:flex;border-bottom:1px solid var(--border);background:var(--white)}
.tab{flex:1;padding:12px 6px;border:none;background:transparent;border-bottom:2px solid transparent;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);cursor:pointer;transition:all 0.2s}
.tab.on{color:var(--ink);border-bottom-color:var(--ink)}

.pb80{padding-bottom:80px}

/* SPLASH SCREEN */
#splash{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:#FAF8F5;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;
  transition:opacity 0.8s ease;
}
#splash.fade{opacity:0;pointer-events:none}
#splash svg{width:72vw;max-width:320px;height:auto}
#splash-sub{
  margin-top:32px;
  font-family:'DM Mono',monospace;
  font-size:9px;
  letter-spacing:5px;
  text-transform:uppercase;
  color:#BBBBBB;
  opacity:0;
  animation:splashsub 0.6s ease 1.0s forwards;
}
@keyframes splashsub{to{opacity:1}}
#splash-logo{
  opacity:0;
  transform:translateY(8px);
  animation:splashlogo 0.9s ease 0.2s forwards;
}
@keyframes splashlogo{to{opacity:1;transform:translateY(0)}}

/* AUTH SCREENS */
#auth{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:9000;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
#auth.show{display:block}
.auth-wrap{max-width:440px;margin:0 auto;padding:48px 24px 60px;min-height:100%;display:flex;flex-direction:column}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo .display{font-size:42px;color:var(--ink)}
.field{margin-bottom:16px}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px;font-family:'DM Mono',monospace}
.field input,.field select,.field textarea{
  width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:2px;
  font-family:'DM Mono',monospace;font-size:13px;color:var(--ink);background:var(--white);
}
.field textarea{resize:vertical;min-height:80px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ink)}
.btn-primary{
  width:100%;padding:14px;background:var(--ink);color:var(--cream);border:none;border-radius:2px;
  font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;
}
.btn-primary:active{opacity:0.8}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-text{background:none;border:none;color:var(--dim);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;text-decoration:underline;padding:8px 0}
.auth-error{background:#fdeeec;border:1px solid var(--red);color:var(--red);padding:10px 12px;font-size:11px;border-radius:2px;margin-bottom:16px}
.step-progress{display:flex;gap:4px;margin-bottom:28px}
.step-progress span{flex:1;height:2px;background:var(--border)}
.step-progress span.on{background:var(--ink)}
.pending-icon{font-size:48px;text-align:center;margin-bottom:20px;color:var(--gold)}
</style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div id="splash">
  <div id="splash-logo">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <defs>
        <style>@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&amp;display=swap');</style>
        <clipPath id="splashClip"><rect width="512" height="512" rx="112" ry="112"/></clipPath>
      </defs>
      <rect width="512" height="512" rx="112" ry="112" fill="#FAF8F5"/>
      <circle cx="70" cy="450" r="200" fill="none" stroke="#DDDDCC" stroke-width="1" opacity="0.5" clip-path="url(#splashClip)"/>
      <text x="256" y="310"
            font-family="'Cormorant Garamond', Georgia, serif"
            font-size="170"
            font-weight="300"
            fill="#111111"
            text-anchor="middle"
            letter-spacing="-4">DDW</text>
      <line x1="166" y1="365" x2="346" y2="365" stroke="#CCCCCC" stroke-width="0.8"/>
      <text x="256" y="394"
            font-family="'Cormorant Garamond', Georgia, serif"
            font-size="19"
            font-weight="400"
            fill="#AAAAAA"
            text-anchor="middle"
            letter-spacing="5">DON'T DIE WONDERING</text>
    </svg>
  </div>
  <div id="splash-sub">Performance &nbsp;·&nbsp; Nutrition &nbsp;·&nbsp; Longevity</div>
</div>

<!-- AUTH SCREENS -->
<div id="auth">
  <div class="auth-wrap" id="auth-content"></div>
</div>

<div id="app">
<div id="view"></div>
<nav id="nav">
  <button class="nb on" onclick="go('home')" id="nb-home"><span class="ni">◇</span><span class="nl">Home</span></button>
  <button class="nb" onclick="go('coach')" id="nb-coach"><span class="ni">◈</span><span class="nl">Coach</span></button>
  <button class="nb" onclick="go('train')" id="nb-train"><span class="ni">◻</span><span class="nl">Train</span></button>
  <button class="nb" onclick="go('fuel')" id="nb-fuel"><span class="ni">◎</span><span class="nl">Fuel</span></button>
  <button class="nb" onclick="go('results')" id="nb-results"><span class="ni">◉</span><span class="nl">Results</span></button>
  <button class="nb" onclick="go('admin')" id="nb-admin" style="display:none"><span class="ni">▲</span><span class="nl">Admin</span></button>
</nav>
</div>

<script>
// ── SUPABASE ──────────────────────────────────────────────────
var SUPABASE_URL = 'https://qeovoxwxbmegczyghwsz.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlb3ZveHd4Ym1lZ2N6eWdod3N6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjc1NzIsImV4cCI6MjA5NzgwMzU3Mn0.NnkVgyPZEcgyvsvXPtfSK1bFHrlb7j9X-9EyxA2cY4Y';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var AUTH = {
  screen: 'login',      // login | register | pending | rejected
  step: 1,               // registration step
  loading: false,
  error: '',
  user: null,
  profile: null,
  reg: {
    first_name:'', last_name:'', email:'', phone:'', password:'',
    age:'', height_in:'', weight_lbs:'', gender:'',
    fitness_level:'', primary_goal:'', desired_outcome:'',
    training_days:'', gym_access:'', injuries:'',
    nutrition_commitment:'', experience_level:'', mindset_answer:''
  }
};

function showAuth(){
  document.getElementById('auth').classList.add('show');
  document.getElementById('app').style.display = 'none';
  renderAuth();
}
function hideAuth(){
  document.getElementById('auth').classList.remove('show');
  document.getElementById('app').style.display = 'flex';
}

// ── AUTH BOOT ─────────────────────────────────────────────────
async function bootAuth(){
  var dismissSplash = function(){
    var splash = document.getElementById('splash');
    if(splash){ splash.classList.add('fade'); setTimeout(function(){splash.style.display='none';},900); }
  };

  var session = (await sb.auth.getSession()).data.session;
  if(!session){
    setTimeout(function(){ dismissSplash(); showAuth(); }, 1400);
    return;
  }
  AUTH.user = session.user;
  var prof = await fetchProfile(session.user.id);
  AUTH.profile = prof;

  setTimeout(function(){
    dismissSplash();
    if(!prof){ AUTH.screen='login'; showAuth(); return; }
    if(prof.status === 'pending'){ AUTH.screen='pending'; showAuth(); return; }
    if(prof.status === 'rejected'){ AUTH.screen='rejected'; showAuth(); return; }
    // approved — enter app
    applyRoleUI();
    hideAuth();
    render();
  }, 1400);
}

function applyRoleUI(){
  var adminTab = document.getElementById('nb-admin');
  if(adminTab) adminTab.style.display = (AUTH.profile && AUTH.profile.role==='admin') ? 'flex' : 'none';
}

async function fetchProfile(userId){
  var res = await sb.from('profiles').select('*').eq('id', userId).single();
  if(res.error) return null;
  return res.data;
}

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin(email, password){
  AUTH.error=''; AUTH.loading=true; renderAuth();
  var res = await sb.auth.signInWithPassword({email:email, password:password});
  AUTH.loading=false;
  if(res.error){ AUTH.error = res.error.message; renderAuth(); return; }
  AUTH.user = res.data.user;
  var prof = await fetchProfile(res.data.user.id);
  AUTH.profile = prof;
  if(!prof){ AUTH.error='No profile found for this account.'; renderAuth(); return; }
  if(prof.status==='pending'){ AUTH.screen='pending'; renderAuth(); return; }
  if(prof.status==='rejected'){ AUTH.screen='rejected'; renderAuth(); return; }
  applyRoleUI();
  hideAuth();
  render();
}

async function doLogout(){
  await sb.auth.signOut();
  AUTH.user=null; AUTH.profile=null; AUTH.screen='login'; AUTH.step=1;
  showAuth();
}

// ── REGISTER ──────────────────────────────────────────────────
async function doRegister(){
  AUTH.error=''; 
  var r = AUTH.reg;
  if(!r.email || !r.password || !r.first_name || !r.last_name){
    AUTH.error = 'Please fill in all required fields.'; renderAuth(); return;
  }
  AUTH.loading=true; renderAuth();

  var signUp = await sb.auth.signUp({email:r.email, password:r.password});
  if(signUp.error){ AUTH.loading=false; AUTH.error = signUp.error.message; renderAuth(); return; }

  var userId = signUp.data.user ? signUp.data.user.id : null;
  if(!userId){
    AUTH.loading=false;
    AUTH.error = 'Check your email to confirm your account, then log in.';
    AUTH.screen='login'; renderAuth(); return;
  }

  // Ensure we have an active session before inserting (RLS needs auth.uid() populated)
  if(!signUp.data.session){
    var signIn = await sb.auth.signInWithPassword({email:r.email, password:r.password});
    if(signIn.error){
      AUTH.loading=false;
      AUTH.error = 'Account created but could not start session: ' + signIn.error.message + '. Try logging in.';
      AUTH.screen='login'; renderAuth(); return;
    }
  }

  var insert = await sb.from('profiles').insert({
    id: userId,
    first_name: r.first_name, last_name: r.last_name, email: r.email, phone: r.phone,
    age: r.age || null, height_in: r.height_in || null, weight_lbs: r.weight_lbs || null,
    gender: r.gender || null, fitness_level: r.fitness_level || null,
    primary_goal: r.primary_goal || null, desired_outcome: r.desired_outcome || null,
    training_days: r.training_days || null, gym_access: r.gym_access || null,
    injuries: r.injuries || null, nutrition_commitment: r.nutrition_commitment || null,
    experience_level: r.experience_level || null, mindset_answer: r.mindset_answer || null,
    start_weight: r.weight_lbs || null, current_weight: r.weight_lbs || null,
    status: 'pending', role: 'client'
  }).select();

  AUTH.loading=false;
  if(insert.error){
    AUTH.error = 'Profile creation failed: ' + insert.error.message + ' (code: ' + (insert.error.code||'unknown') + ')';
    renderAuth(); return;
  }
  if(!insert.data || insert.data.length===0){
    AUTH.error = 'Profile creation returned no data — row may not have been created. Check RLS policies.';
    renderAuth(); return;
  }

  AUTH.user = signUp.data.user;
  AUTH.profile = {status:'pending'};
  AUTH.screen='pending';
  renderAuth();
}

function regUpdate(field, val){ AUTH.reg[field] = val; }
function regNext(){
  if(AUTH.step===1){
    if(!AUTH.reg.first_name||!AUTH.reg.last_name||!AUTH.reg.email||!AUTH.reg.password){
      AUTH.error='Please fill in all required fields.'; renderAuth(); return;
    }
  }
  AUTH.error='';
  AUTH.step++;
  renderAuth();
}
function regBack(){ AUTH.step--; AUTH.error=''; renderAuth(); }

// ── RENDER AUTH ───────────────────────────────────────────────
function renderAuth(){
  var c = document.getElementById('auth-content');
  var html = '';

  html += '<div class="auth-logo"><div class="display">DDW</div></div>';

  if(AUTH.error){
    html += '<div class="auth-error">'+AUTH.error+'</div>';
  }

  if(AUTH.screen==='login') html += authLogin();
  else if(AUTH.screen==='register') html += authRegister();
  else if(AUTH.screen==='pending') html += authPending();
  else if(AUTH.screen==='rejected') html += authRejected();

  c.innerHTML = html;
}

function authLogin(){
  var html = '';
  html += '<div class="eyebrow" style="text-align:center;margin-bottom:24px">Welcome Back</div>';
  html += '<div class="field"><label>Email</label><input type="email" id="li-email" placeholder="you@email.com"/></div>';
  html += '<div class="field"><label>Password</label><input type="password" id="li-pass" placeholder="••••••••"/></div>';
  html += '<button class="btn-primary" '+(AUTH.loading?'disabled':'')+' onclick="doLogin(document.getElementById(\'li-email\').value,document.getElementById(\'li-pass\').value)">'+(AUTH.loading?'Signing In...':'Sign In')+'</button>';
  html += '<div style="text-align:center;margin-top:20px"><button class="btn-text" onclick="AUTH.screen=\'register\';AUTH.step=1;AUTH.error=\'\';renderAuth()">New here? Apply for DDW</button></div>';
  return html;
}

function authRejected(){
  var html = '';
  html += '<div class="pending-icon">✕</div>';
  html += '<div class="display" style="font-size:22px;text-align:center;margin-bottom:12px">Application Not Approved</div>';
  html += '<div style="font-size:12px;color:var(--dim);text-align:center;line-height:1.6;margin-bottom:24px">Reach out to the DDW team directly if you believe this is an error.</div>';
  html += '<button class="btn-text" style="margin:0 auto;display:block" onclick="doLogout()">Back to Login</button>';
  return html;
}

function authPending(){
  var html = '';
  html += '<div class="pending-icon">◐</div>';
  html += '<div class="display" style="font-size:22px;text-align:center;margin-bottom:12px">Application Pending</div>';
  html += '<div style="font-size:12px;color:var(--dim);text-align:center;line-height:1.6;margin-bottom:24px">Your application is under review. Edson personally approves every DDW client. You\'ll get access as soon as you\'re approved.</div>';
  html += '<button class="btn-text" style="margin:0 auto;display:block" onclick="doLogout()">Sign Out</button>';
  return html;
}

function authRegister(){
  var r = AUTH.reg;
  var totalSteps = 3;
  var html = '';
  html += '<div class="step-progress">';
  for(var i=1;i<=totalSteps;i++) html += '<span class="'+(i<=AUTH.step?'on':'')+'"></span>';
  html += '</div>';

  if(AUTH.step===1){
    html += '<div class="eyebrow" style="margin-bottom:20px">Step 1 — Create Account</div>';
    html += '<div class="field"><label>First Name *</label><input id="r-fn" value="'+r.first_name+'" oninput="regUpdate(\'first_name\',this.value)"/></div>';
    html += '<div class="field"><label>Last Name *</label><input id="r-ln" value="'+r.last_name+'" oninput="regUpdate(\'last_name\',this.value)"/></div>';
    html += '<div class="field"><label>Email *</label><input type="email" id="r-em" value="'+r.email+'" oninput="regUpdate(\'email\',this.value)"/></div>';
    html += '<div class="field"><label>Phone</label><input id="r-ph" value="'+r.phone+'" oninput="regUpdate(\'phone\',this.value)"/></div>';
    html += '<div class="field"><label>Password *</label><input type="password" id="r-pw" value="'+r.password+'" oninput="regUpdate(\'password\',this.value)"/></div>';
    html += '<button class="btn-primary" onclick="regNext()">Continue</button>';
  }

  else if(AUTH.step===2){
    html += '<div class="eyebrow" style="margin-bottom:20px">Step 2 — Physical Stats</div>';
    html += '<div class="field"><label>Age</label><input type="number" value="'+r.age+'" oninput="regUpdate(\'age\',this.value)"/></div>';
    html += '<div class="field"><label>Height (inches)</label><input type="number" value="'+r.height_in+'" oninput="regUpdate(\'height_in\',this.value)"/></div>';
    html += '<div class="field"><label>Weight (lbs)</label><input type="number" value="'+r.weight_lbs+'" oninput="regUpdate(\'weight_lbs\',this.value)"/></div>';
    html += '<div class="field"><label>Gender</label><select oninput="regUpdate(\'gender\',this.value)"><option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option></select></div>';
    html += '<div class="field"><label>Current Status</label><select oninput="regUpdate(\'fitness_level\',this.value)"><option value="">Select...</option><option>Beginner</option><option>Intermediate</option><option>Advanced</option></select></div>';
    html += '<div class="field"><label>Primary Goal</label><select oninput="regUpdate(\'primary_goal\',this.value)"><option value="">Select...</option><option>Lose Weight</option><option>Build Muscle</option><option>Recomp</option><option>Increase Strength</option><option>Improve Athletic Performance</option></select></div>';
    html += '<div style="display:flex;gap:10px"><button class="btn-text" onclick="regBack()">← Back</button></div>';
    html += '<button class="btn-primary" style="margin-top:10px" onclick="regNext()">Continue</button>';
  }

  else if(AUTH.step===3){
    html += '<div class="eyebrow" style="margin-bottom:20px">Step 3 — Training & Mindset</div>';
    html += '<div class="field"><label>Training Availability</label><select oninput="regUpdate(\'training_days\',this.value)"><option value="">Select...</option><option>3 days</option><option>4 days</option><option>5 days</option><option>6 days</option></select></div>';
    html += '<div class="field"><label>Gym Access</label><select oninput="regUpdate(\'gym_access\',this.value)"><option value="">Select...</option><option>Full Gym</option><option>Home Gym</option><option>Bodyweight Only</option></select></div>';
    html += '<div class="field"><label>Injuries / Limitations</label><textarea oninput="regUpdate(\'injuries\',this.value)"></textarea></div>';
    html += '<div class="field"><label>Nutrition Commitment Level</label><select oninput="regUpdate(\'nutrition_commitment\',this.value)"><option value="">Select...</option><option>Low</option><option>Medium</option><option>High</option></select></div>';
    html += '<div class="field"><label>Why are you joining DDW?</label><textarea oninput="regUpdate(\'mindset_answer\',this.value)"></textarea></div>';
    html += '<div style="display:flex;gap:10px"><button class="btn-text" onclick="regBack()">← Back</button></div>';
    html += '<button class="btn-primary" style="margin-top:10px" '+(AUTH.loading?'disabled':'')+' onclick="doRegister()">'+(AUTH.loading?'Submitting...':'Submit Application')+'</button>';
  }

  html += '<div style="text-align:center;margin-top:20px"><button class="btn-text" onclick="AUTH.screen=\'login\';AUTH.error=\'\';renderAuth()">Already approved? Sign in</button></div>';
  return html;
}
</script>

<script>
var S = {page:'home', trainDay:0, mealPlan:'hybrid', mealTab:'breakfast', mealLog:{}, sub:null, subData:null};

// ── STORAGE ───────────────────────────────────────────────────
function todayKey(){ return new Date().toISOString().split('T')[0]; }
function loadJ(k,d){ try{ return JSON.parse(localStorage.getItem(k)||'null')||d; }catch(e){ return d; } }
function saveJ(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }

function getMacroLog(){
  var all = loadJ('ddw_macros', {});
  return all[todayKey()] || {p:0,c:0,f:0,cal:0,meals:[]};
}

function logMeal(meal){
  var all = loadJ('ddw_macros', {});
  var today = todayKey();
  if(!all[today]) all[today] = {p:0,c:0,f:0,cal:0,meals:[]};
  var d = all[today];
  if(d.meals.indexOf(meal.id) === -1){
    d.meals.push(meal.id);
    d.p += meal.p; d.c += meal.c; d.f += meal.f; d.cal += meal.cal;
    saveJ('ddw_macros', all);
  }
  render();
}

function getStreak(){
  var s = loadJ('ddw_str',{}), t = todayKey();
  var y = new Date(); y.setDate(y.getDate()-1);
  var yk = y.toISOString().split('T')[0];
  return (s.last===t||s.last===yk) ? (s.count||0) : 0;
}

function logWorkout(){
  var s = loadJ('ddw_str',{}), t = todayKey();
  var y = new Date(); y.setDate(y.getDate()-1);
  var yk = y.toISOString().split('T')[0];
  if(s.last === t) return render();
  s.count = (s.last===yk) ? (s.count||0)+1 : 1;
  s.last = t;
  saveJ('ddw_str', s);
  render();
}

function go(page){
  S.page=page; S.sub=null; S.subData=null;
  document.querySelectorAll('.nb').forEach(function(b){ b.classList.remove('on'); });
  var nb = document.getElementById('nb-'+page);
  if(nb) nb.classList.add('on');
  render();
  if(page==='admin' && ADMIN.clients.length===0 && !ADMIN.loading){
    adminSetTab(ADMIN.tab);
  }
}
function render(){
  var v=document.getElementById('view');
  v.innerHTML=''; v.scrollTop=0;
  if(S.page==='home') renderHome(v);
  else if(S.page==='coach') renderCoach(v);
  else if(S.page==='train') renderTrain(v);
  else if(S.page==='fuel') renderFuel(v);
  else if(S.page==='results') renderResults(v);
  else if(S.page==='admin') renderAdmin(v);
}

// ── ADMIN STATE ───────────────────────────────────────────────
var ADMIN = {
  tab: 'pending',       // pending | approved | rejected
  clients: [],
  loading: false,
  selected: null,        // selected client profile for detail view
  mealEdit: null,        // working copy of meal plan being edited
  workoutEdit: null,     // working copy of workout plan being edited
  notes: [],
  error: ''
};

async function fetchClients(status){
  ADMIN.loading = true;
  var q = sb.from('profiles').select('*').neq('role','admin').order('created_at',{ascending:false});
  if(status) q = q.eq('status', status);
  var res = await q;
  ADMIN.loading = false;
  if(res.error){ ADMIN.error = res.error.message; return []; }
  return res.data || [];
}

async function adminSetTab(tab){
  ADMIN.tab = tab;
  ADMIN.selected = null;
  render();
  ADMIN.clients = await fetchClients(tab==='all'?null:tab);
  render();
}

async function approveClient(userId){
  var res = await sb.from('profiles').update({status:'approved'}).eq('id', userId);
  if(res.error){ alert('Error: '+res.error.message); return; }
  ADMIN.clients = await fetchClients(ADMIN.tab);
  render();
}

async function rejectClient(userId){
  var res = await sb.from('profiles').update({status:'rejected'}).eq('id', userId);
  if(res.error){ alert('Error: '+res.error.message); return; }
  ADMIN.clients = await fetchClients(ADMIN.tab);
  render();
}

  var existingWorkout = (workoutRes.data && workoutRes.data[0]) || null;
  ADMIN.workoutEdit = existingWorkout || {
    user_id: client.id, plan_name:'Custom Program',
    days: GYM.map(function(d){ return {day:d.day, focus:d.focus, tag:d.tag, exercises:d.exercises.slice()}; })
  };

  var notesRes = await sb.from('client_notes').select('*').eq('user_id', client.id).order('created_at',{ascending:false});
  ADMIN.notes = notesRes.data || [];

  render();
}

async function saveMealPlan(){
  var m = ADMIN.mealEdit;
  var payload = {
    user_id: m.user_id, plan_name: m.plan_name,
    target_cal: m.target_cal, target_protein: m.target_protein,
    target_carbs: m.target_carbs, target_fat: m.target_fat,
    meals: m.meals, created_by: AUTH.user.id, updated_at: new Date().toISOString()
  };
  var res;
  if(m.id) res = await sb.from('client_meal_plans').update(payload).eq('id', m.id);
  else res = await sb.from('client_meal_plans').insert(payload).select().single();
  if(res.error){ alert('Save failed: '+res.error.message); return; }
  if(!m.id && res.data) ADMIN.mealEdit.id = res.data.id;
  alert('Meal plan saved.');
}

async function saveWorkoutPlan(){
  var w = ADMIN.workoutEdit;
  var payload = {
    user_id: w.user_id, plan_name: w.plan_name, days: w.days,
    created_by: AUTH.user.id, updated_at: new Date().toISOString()
  };
  var res;
  if(w.id) res = await sb.from('client_workout_plans').update(payload).eq('id', w.id);
  else res = await sb.from('client_workout_plans').insert(payload).select().single();
  if(res.error){ alert('Save failed: '+res.error.message); return; }
  if(!w.id && res.data) ADMIN.workoutEdit.id = res.data.id;
  alert('Workout plan saved.');
}

async function addClientNote(text){
  if(!text) return;
  var res = await sb.from('client_notes').insert({user_id: ADMIN.selected.id, note:text, created_by:AUTH.user.id}).select().single();
  if(res.error){ alert('Error: '+res.error.message); return; }
  ADMIN.notes.unshift(res.data);
  render();
}

function mealField(idx, field, val){
  ADMIN.mealEdit.meals[idx][field] = (field==='cal'||field==='protein'||field==='carbs'||field==='fat') ? Number(val)||0 : val;
}
function mealItemField(mIdx, iIdx, val){
  ADMIN.mealEdit.meals[mIdx].items[iIdx] = val;
}
function addMealItem(mIdx){
  ADMIN.mealEdit.meals[mIdx].items.push('');
  render();
}
function targetField(field, val){ ADMIN.mealEdit[field] = Number(val)||0; }

function workoutDayField(dIdx, field, val){ ADMIN.workoutEdit.days[dIdx][field] = val; }
function workoutExField(dIdx, eIdx, field, val){ ADMIN.workoutEdit.days[dIdx].exercises[eIdx][field] = val; }
function addExercise(dIdx){
  ADMIN.workoutEdit.days[dIdx].exercises.push({name:'New Exercise', sets:'3', reps:'10', note:'', link:''});
  render();
}
function removeExercise(dIdx, eIdx){
  ADMIN.workoutEdit.days[dIdx].exercises.splice(eIdx,1);
  render();
}

// ── RENDER ADMIN ──────────────────────────────────────────────
function renderAdmin(v){
  var html = '<div class="pb80">';

  html += '<div style="background:var(--ink);padding:40px 24px 24px">';
  html += '<div class="eyebrow" style="color:rgba(255,255,255,0.35);margin-bottom:10px">Admin</div>';
  html += '<div class="display" style="font-size:30px;color:var(--cream)">Client Management</div>';
  html += '</div>';

  if(ADMIN.selected){
    html += renderClientDetail();
  } else {
    html += '<div style="display:flex;border-bottom:1px solid var(--border)">';
    ['pending','approved','rejected','all'].forEach(function(t){
      var on = ADMIN.tab===t;
      html += '<button onclick="adminSetTab(\''+t+'\')" style="flex:1;padding:14px 4px;border:none;background:transparent;border-bottom:2px solid '+(on?'var(--ink)':'transparent')+';color:'+(on?'var(--ink)':'var(--dim)')+';font-family:\'DM Mono\',monospace;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">'+t+'</button>';
    });
    html += '</div>';

    html += '<div style="padding:16px 20px">';
    if(ADMIN.loading){
      html += '<div style="text-align:center;color:var(--dim);font-size:12px;padding:30px 0">Loading...</div>';
    } else if(ADMIN.clients.length===0){
      html += '<div style="text-align:center;color:var(--dim);font-size:12px;padding:30px 0">No '+ADMIN.tab+' clients.</div>';
    } else {
      ADMIN.clients.forEach(function(c){
        html += '<div style="background:var(--white);border:1px solid var(--border);padding:14px;margin-bottom:8px">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
        html += '<div onclick=\'openClientDetail('+JSON.stringify(c).replace(/'/g,"&#39;")+')\' style="cursor:pointer;flex:1">';
        html += '<div style="font-family:Cormorant Garamond,serif;font-size:18px;color:var(--ink)">'+c.first_name+' '+c.last_name+'</div>';
        html += '<div style="font-size:10px;color:var(--dim);margin-top:2px">'+c.email+'</div>';
        html += '<div style="font-size:10px;color:var(--dim);margin-top:4px">'+(c.primary_goal||'No goal set')+' · '+(c.fitness_level||'Level unset')+'</div>';
        html += '</div>';
        html += '<span class="pill" style="font-size:8px">'+c.status+'</span>';
        html += '</div>';
        if(c.status==='pending'){
          html += '<div style="display:flex;gap:8px;margin-top:8px">';
          html += '<button onclick="approveClient(\''+c.id+'\')" style="flex:1;padding:8px;background:var(--ink);color:var(--cream);border:none;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">Approve</button>';
          html += '<button onclick="rejectClient(\''+c.id+'\')" style="flex:1;padding:8px;background:transparent;color:var(--red);border:1px solid var(--red);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer">Reject</button>';
          html += '</div>';
        }
        html += '</div>';
      });
    }
    html += '</div>';
  }

  html += '</div>';
  v.innerHTML = html;
}

function renderClientDetail(){
  var c = ADMIN.selected;
  var html = '<div style="padding:20px">';
  html += '<button onclick="ADMIN.selected=null;render()" style="background:none;border:none;font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:2px;color:var(--dim);cursor:pointer;padding:0;margin-bottom:20px;text-transform:uppercase">← Back to List</button>';

  // Profile summary
  html += '<div class="display" style="font-size:26px;margin-bottom:4px">'+c.first_name+' '+c.last_name+'</div>';
  html += '<div style="font-size:11px;color:var(--dim);margin-bottom:20px">'+c.email+' · '+(c.phone||'No phone')+'</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px">';
  html += statBox('Age', c.age||'—');
  html += statBox('Gender', c.gender||'—');
  html += statBox('Height', c.height_in?c.height_in+' in':'—');
  html += statBox('Weight', c.weight_lbs?c.weight_lbs+' lbs':'—');
  html += statBox('Goal', c.primary_goal||'—');
  html += statBox('Level', c.fitness_level||'—');
  html += statBox('Days/wk', c.training_days||'—');
  html += statBox('Gym Access', c.gym_access||'—');
  html += '</div>';

  if(c.injuries){ html += '<div style="margin-bottom:14px"><div class="eyebrow" style="margin-bottom:4px">Injuries</div><div style="font-size:12px;color:var(--ink2)">'+c.injuries+'</div></div>'; }
  if(c.mindset_answer){ html += '<div style="margin-bottom:24px"><div class="eyebrow" style="margin-bottom:4px">Why They Joined</div><div style="font-size:12px;color:var(--ink2);font-style:italic">"'+c.mindset_answer+'"</div></div>'; }

  // Meal plan editor
  if(ADMIN.mealEdit){
    html += '<div class="rule" style="margin:24px 0"></div>';
    html += '<div class="eyebrow" style="margin-bottom:12px">Custom Meal Plan</div>';
    var m = ADMIN.mealEdit;
    html += '<div class="field"><label>Plan Name</label><input value="'+m.plan_name+'" oninput="ADMIN.mealEdit.plan_name=this.value"/></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
    html += '<div class="field"><label>Target Cal</label><input type="number" value="'+m.target_cal+'" oninput="targetField(\'target_cal\',this.value)"/></div>';
    html += '<div class="field"><label>Protein (g)</label><input type="number" value="'+m.target_protein+'" oninput="targetField(\'target_protein\',this.value)"/></div>';
    html += '<div class="field"><label>Carbs (g)</label><input type="number" value="'+m.target_carbs+'" oninput="targetField(\'target_carbs\',this.value)"/></div>';
    html += '<div class="field"><label>Fat (g)</label><input type="number" value="'+m.target_fat+'" oninput="targetField(\'target_fat\',this.value)"/></div>';
    html += '</div>';

    m.meals.forEach(function(meal, i){
      html += '<div style="background:var(--white);border:1px solid var(--border);padding:12px;margin-bottom:10px">';
      html += '<input value="'+meal.name+'" oninput="mealField('+i+',\'name\',this.value)" style="font-family:Cormorant Garamond,serif;font-size:16px;border:none;padding:0;margin-bottom:8px;width:100%"/>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
      html += '<input placeholder="Time" value="'+meal.time+'" oninput="mealField('+i+',\'time\',this.value)" style="font-size:10px;padding:6px"/>';
      html += '<input type="number" placeholder="Cal" value="'+meal.cal+'" oninput="mealField('+i+',\'cal\',this.value)" style="font-size:10px;padding:6px"/>';
      html += '</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px">';
      html += '<input type="number" placeholder="Protein g" value="'+meal.protein+'" oninput="mealField('+i+',\'protein\',this.value)" style="font-size:10px;padding:6px"/>';
      html += '<input type="number" placeholder="Carbs g" value="'+meal.carbs+'" oninput="mealField('+i+',\'carbs\',this.value)" style="font-size:10px;padding:6px"/>';
      html += '<input type="number" placeholder="Fat g" value="'+meal.fat+'" oninput="mealField('+i+',\'fat\',this.value)" style="font-size:10px;padding:6px"/>';
      html += '</div>';
      meal.items.forEach(function(item, j){
        html += '<input value="'+item+'" placeholder="Food item" oninput="mealItemField('+i+','+j+',this.value)" style="font-size:11px;padding:6px;margin-bottom:4px;width:100%"/>';
      });
      html += '<button onclick="addMealItem('+i+')" style="background:none;border:none;color:var(--dim);font-size:10px;text-decoration:underline;cursor:pointer;padding:4px 0">+ Add item</button>';
      html += '</div>';
    });
    html += '<button class="btn-primary" onclick="saveMealPlan()">Save Meal Plan</button>';
  }

  // Workout plan editor
  if(ADMIN.workoutEdit){
    html += '<div class="rule" style="margin:24px 0"></div>';
    html += '<div class="eyebrow" style="margin-bottom:12px">Custom Workout Program</div>';
    var w = ADMIN.workoutEdit;
    html += '<div class="field"><label>Program Name</label><input value="'+w.plan_name+'" oninput="ADMIN.workoutEdit.plan_name=this.value"/></div>';

    w.days.forEach(function(day, di){
      html += '<div style="background:var(--white);border:1px solid var(--border);padding:12px;margin-bottom:10px">';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
      html += '<input value="'+day.day+'" oninput="workoutDayField('+di+',\'day\',this.value)" style="font-family:Cormorant Garamond,serif;font-size:16px;padding:4px"/>';
      html += '<input value="'+day.focus+'" oninput="workoutDayField('+di+',\'focus\',this.value)" style="font-size:11px;padding:6px"/>';
      html += '</div>';
      day.exercises.forEach(function(ex, ei){
        html += '<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:8px">';
        html += '<input value="'+ex.name+'" oninput="workoutExField('+di+','+ei+',\'name\',this.value)" style="font-size:12px;padding:6px;margin-bottom:4px;width:100%"/>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">';
        html += '<input placeholder="Sets" value="'+ex.sets+'" oninput="workoutExField('+di+','+ei+',\'sets\',this.value)" style="font-size:10px;padding:6px"/>';
        html += '<input placeholder="Reps" value="'+ex.reps+'" oninput="workoutExField('+di+','+ei+',\'reps\',this.value)" style="font-size:10px;padding:6px"/>';
        html += '<button onclick="removeExercise('+di+','+ei+')" style="font-size:9px;color:var(--red);background:none;border:1px solid var(--red);cursor:pointer">Remove</button>';
        html += '</div>';
        html += '</div>';
      });
      html += '<button onclick="addExercise('+di+')" style="background:none;border:none;color:var(--dim);font-size:10px;text-decoration:underline;cursor:pointer;padding:8px 0 0">+ Add exercise</button>';
      html += '</div>';
    });
    html += '<button class="btn-primary" onclick="saveWorkoutPlan()">Save Workout Plan</button>';
  }

  // Notes
  html += '<div class="rule" style="margin:24px 0"></div>';
  html += '<div class="eyebrow" style="margin-bottom:12px">Coaching Notes</div>';
  html += '<div class="field"><textarea id="new-note" placeholder="Add a note about this client..."></textarea></div>';
  html += '<button class="btn-primary" style="margin-bottom:16px" onclick="addClientNote(document.getElementById(\'new-note\').value);document.getElementById(\'new-note\').value=\'\'">Add Note</button>';
  ADMIN.notes.forEach(function(n){
    html += '<div style="background:var(--white);border:1px solid var(--border);padding:10px;margin-bottom:6px;font-size:11px;color:var(--ink2)">'+n.note+'<div style="font-size:9px;color:var(--dim);margin-top:4px">'+new Date(n.created_at).toLocaleDateString()+'</div></div>';
  });

  html += '</div>';
  return html;
}

function statBox(label, val){
  return '<div style="background:var(--white);border:1px solid var(--border);padding:10px"><div style="font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--dim);margin-bottom:4px">'+label+'</div><div style="font-size:13px;color:var(--ink)">'+val+'</div></div>';
}

// ── BOOT (auth-gated) ─────────────────────────────────────────
window.addEventListener('load', function(){
  bootAuth();
});
</script>
